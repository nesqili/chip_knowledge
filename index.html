<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>芯片成本学习页 · Chip Cost Learning</title>
<style>
  :root{
    --bg:#f6f7fb; --panel:#ffffff; --ink:#1b2030; --muted:#6b7280;
    --brand:#2f6feb; --brand-2:#7c3aed; --line:#e5e7eb; --chip:#eef2ff;
    --d1:#3b82f6; --d2:#10b981; --d3:#f59e0b; --d4:#ef4444; --d5:#8b5cf6;
    --ok:#16a34a;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#0f1220; --panel:#161a2c; --ink:#e5e7eb; --muted:#9aa3b2; --line:#262b44; --chip:#1f2440;}
  }
  body.dark{--bg:#0f1220; --panel:#161a2c; --ink:#e5e7eb; --muted:#9aa3b2; --line:#262b44; --chip:#1f2440;}
  body.light{--bg:#f6f7fb; --panel:#ffffff; --ink:#1b2030; --muted:#6b7280; --line:#e5e7eb; --chip:#eef2ff;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    font-size:14px;line-height:1.55}
  a{color:var(--brand);text-decoration:none}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;padding:10px 16px}
  header .title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
  header .title .logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--brand),var(--brand-2))}
  header .search{flex:1;max-width:520px;position:relative}
  header .search input{width:100%;padding:8px 12px 8px 34px;border-radius:10px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink);outline:none}
  header .search svg{position:absolute;left:10px;top:9px;opacity:.6}
  header .chip-picker{display:flex;gap:6px}
  header .chip-picker button,header .theme{padding:6px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);cursor:pointer;font-size:12px}
  header .chip-picker button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 54px)}
  nav.side{border-right:1px solid var(--line);background:var(--panel);padding:10px}
  nav.side .group{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:10px 8px 4px}
  nav.side a{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;color:var(--ink);cursor:pointer}
  nav.side a:hover{background:var(--chip)}
  nav.side a.active{background:var(--chip);color:var(--brand);font-weight:600}
  nav.side a .pill{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--chip);color:var(--muted)}
  nav.side a.active .pill{background:var(--brand);color:#fff}
  main{padding:18px 22px;max-width:1180px}
  h1{font-size:22px;margin:4px 0 4px}
  h2{font-size:18px;margin:22px 0 10px}
  h3{font-size:15px;margin:14px 0 8px}
  .sub{color:var(--muted);margin-top:2px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .grid{display:grid;gap:14px}
  .grid.cols-2{grid-template-columns:1fr 1fr}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .grid.cols-5{grid-template-columns:repeat(5,1fr)}
  @media(max-width:960px){.layout{grid-template-columns:1fr}nav.side{display:none}.grid.cols-2,.grid.cols-3,.grid.cols-5{grid-template-columns:1fr}}
  .kpi{display:flex;flex-direction:column;gap:4px}
  .kpi .val{font-size:22px;font-weight:700}
  .kpi .label{color:var(--muted);font-size:12px}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;background:var(--chip);color:var(--ink)}
  .tag.d1{background:rgba(59,130,246,.15);color:var(--d1)}
  .tag.d2{background:rgba(16,185,129,.15);color:var(--d2)}
  .tag.d3{background:rgba(245,158,11,.15);color:var(--d3)}
  .tag.d4{background:rgba(239,68,68,.15);color:var(--d4)}
  .tag.d5{background:rgba(139,92,246,.15);color:var(--d5)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:12px;background:var(--panel);position:sticky;top:0}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--chip)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}
  .filters select,.filters input{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink)}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,92vw);background:var(--panel);
    border-left:1px solid var(--line);padding:18px;overflow-y:auto;transform:translateX(100%);
    transition:transform .25s ease;z-index:50;box-shadow:-12px 0 30px rgba(0,0,0,.1)}
  .drawer.open{transform:translateX(0)}
  .drawer .close{float:right;border:0;background:transparent;font-size:20px;cursor:pointer;color:var(--muted)}
  .drawer h3{margin-top:0}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
  .backdrop.show{opacity:1;pointer-events:auto}
  .formula{font-family:ui-monospace,Menlo,monospace;background:var(--chip);padding:10px 12px;border-radius:10px;display:block;white-space:pre-wrap}
  .bar{height:10px;border-radius:999px;background:var(--chip);overflow:hidden;display:flex}
  .bar span{display:block;height:100%}
  .legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
  .calc-form label{display:block;font-size:12px;color:var(--muted);margin-top:8px}
  .calc-form input,.calc-form select{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink)}
  .out-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line)}
  .out-row:last-child{border-bottom:0}
  .out-row b{font-variant-numeric:tabular-nums}
  .hidden{display:none!important}
  .hint{color:var(--muted);font-size:12px}
  .pyramid-tier{cursor:pointer;transition:opacity .2s}
  .pyramid-tier:hover{opacity:.85}
  footer{padding:18px 22px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);margin-top:20px}
  .breadcrumb{color:var(--muted);font-size:12px;margin-bottom:2px}
  .search-results{position:absolute;top:40px;left:0;right:0;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);max-height:360px;overflow:auto;z-index:30;display:none}
  .search-results.show{display:block}
  .search-results .group-h{padding:6px 12px;font-size:11px;color:var(--muted);text-transform:uppercase;background:var(--chip)}
  .search-results .item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
  .search-results .item:hover{background:var(--chip)}
  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .modal.show{display:flex}
  .modal-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(560px,100%);max-height:90vh;overflow:auto;padding:18px}
  .modal-card h3{margin-top:0}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .btn{padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;font-size:12px}
  .btn:hover{background:var(--chip)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.danger{color:#fff;background:#ef4444;border-color:#ef4444}
  .btn.ghost{background:transparent}
  .btn.sm{padding:3px 8px;font-size:11px}
  .table-toolbar{display:flex;justify-content:space-between;align-items:center;margin:8px 0 8px}
  .table-toolbar .left{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .group-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
  .group-card .group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .group-card .group-head h3{margin:0}
  .supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .supplier-tile{border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--bg);position:relative;cursor:pointer;transition:transform .12s}
  .supplier-tile:hover{transform:translateY(-2px);border-color:var(--brand)}
  .supplier-tile .name{font-weight:600;font-size:13px}
  .supplier-tile .role{color:var(--muted);font-size:11px;margin-top:2px;line-height:1.4}
  .supplier-tile .region{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;background:var(--chip);color:var(--muted);margin-top:6px}
  .supplier-tile .ops{position:absolute;top:6px;right:6px;display:none;gap:4px}
  .supplier-tile:hover .ops{display:flex}
  .layer-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .layer-tabs button{padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;font-size:12px}
  .layer-tabs button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .highlight-box{border:2px dashed var(--brand);border-radius:12px;padding:10px 14px;background:linear-gradient(90deg,rgba(47,111,235,.08),rgba(124,58,237,.08));margin-top:10px}
  .highlight-box .num{font-size:32px;font-weight:800;color:var(--brand)}
  .pct-bar-row{display:flex;align-items:center;gap:8px;margin:6px 0}
  .pct-bar-row .lbl{flex:0 0 130px;font-size:12px}
  .pct-bar-row .bar2{flex:1;height:14px;background:var(--chip);border-radius:999px;overflow:hidden}
  .pct-bar-row .bar2 span{display:block;height:100%;background:var(--brand)}
  .pct-bar-row .pct{flex:0 0 50px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .matrix-table th,.matrix-table td{font-size:12px;text-align:right;padding:6px 8px}
  .matrix-table th:first-child,.matrix-table td:first-child{text-align:left;font-weight:600}
  .matrix-table td.empty{color:var(--muted);opacity:.5}
</style>
</head>
<body class="light">
<header>
  <div class="title"><span class="logo"></span>芯片成本学习页 <span class="hint">Chip Cost for PM</span></div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="globalSearch" placeholder="搜索：成本项 / 供应商 / 术语 / 公式…" autocomplete="off"/>
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="chip-picker" id="chipPicker"></div>
  <button class="btn" id="chipMgrBtn" title="管理对标芯片">···</button>
  <button class="theme" id="themeBtn">切换主题</button>
</header>

<div class="layout">
  <nav class="side" id="nav">
    <div class="group">金字塔 · Pyramid</div>
    <a data-tab="overview" class="active"><span class="pill">L1</span>总览</a>
    <a data-tab="domains"><span class="pill">L2</span>五大成本域</a>
    <a data-tab="items"><span class="pill">L3</span>成本明细项</a>

    <a data-tab="formulas">公式推导</a>
    <a data-tab="glossary">术语表</a>
  </nav>

  <main id="main">
    <!-- Sections injected by JS -->
  </main>
</div>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer">
  <button class="close" id="drawerClose">×</button>
  <div id="drawerBody"></div>
</aside>

<div class="modal" id="editModal">
  <div class="modal-card">
    <h3 id="editTitle">编辑</h3>
    <div id="editBody"></div>
    <div class="row-actions" style="margin-top:14px">
      <button class="btn ghost" id="editCancel">取消</button>
      <button class="btn primary" id="editSave">保存</button>
    </div>
  </div>
</div>

<footer>
  数值均为基于公开资料的量级估算，仅作教学示意，不构成报价或投资建议。 ·
  对标芯片：Rockchip RK3566 / RK3588（边缘侧 SoC）。

const GLOSSARY = [
  {term:'ASP',def:'Average Selling Price，平均售价。ASP − Unit Cost = 毛利。'},
  {term:'ATE',def:'Automated Test Equipment，自动测试机，如 Teradyne UltraFLEX、Advantest V93000。'},
  {term:'BOM',def:'Bill of Materials，物料清单。在系统层面，芯片是 BOM 中的一行。'},
  {term:'CP',def:'Circuit Probe，晶圆级测试，用探针卡在未切割晶圆上初筛。'},
  {term:'D0',def:'Defect Density，缺陷密度，单位 defects/cm²，是良率模型关键参数。'},
  {term:'DPW',def:'Die Per Wafer，每片晶圆可切出的 Die 数。'},
  {term:'FCBGA',def:'Flip-Chip Ball Grid Array，倒装球栅阵列，高端 SoC 常用封装。'},
  {term:'FT',def:'Final Test，封装后的终测。'},
  {term:'KGD',def:'Known Good Die，经过测试确认良好的裸片，常用于 SiP/Chiplet。'},
  {term:'NRE',def:'Non-Recurring Engineering，一次性工程投入，需按销量摊销。'},
  {term:'OSAT',def:'Outsourced Semiconductor Assembly and Test，专业封测代工厂，如 ASE、Amkor。'},
  {term:'Reticle',def:'光罩、掩膜版。全套 Mask Set 在 8nm 约 10–15M USD。'},
  {term:'SLT',def:'System Level Test，系统级测试，在接近真实负载下筛选。'},
  {term:'Tape-out',def:'流片，把最终 GDSII 交给代工厂制作掩膜开始量产。'},
  {term:'Yield',def:'良率 = 好 Die / 总 Die。Murphy 模型常用。'},
  {term:'Wafer bank',def:'晶圆银行，已完成前道但未封装的晶圆库存，用来缩短交期。'}
];

const LAYER_DETAILS = {IP:{title:"IP（知识产权核）— CPU/GPU/NPU 设计授权",summary:"IP（Intellectual Property）是芯片设计中的\"乐高积木\"——设计公司从 IP 厂商获得 CPU 核、GPU 核、接口控制器等授权，集成到自己的 SoC 中。IP 费用通常包含前期授权费（License Fee）和量产版税（Royalty，按颗计）。",sections:[{heading:"IP 类型与典型供应商",type:"table",headers:["IP 类型","说明","典型供应商","收费模式"],rows:[["CPU IP","Arm Cortex-A/R/M 系列，RISC-V 生态兴起","Arm, SiFive, Andes, 平头哥","License + Royalty（~1-3%/颗）"],["GPU IP","移动/嵌入式 GPU 核","Arm (Mali), Imagination (PowerVR), VeriSilicon (Vivante)","License + Royalty"],["NPU IP","AI 加速器 IP","Arm (Ethos), VeriSilicon (VIP), Ceva, 寒武纪","License + Royalty，或按 TOPS 计"],["DSP IP","音频/视觉/通信 DSP","Cadence (Tensilica), Ceva, Synopsys (ARC)","License + Royalty"],["接口 IP","USB/PCIe/DDR/MIPI/HDMI 等","Synopsys (DesignWare), Cadence, Alphawave, Innosilicon","License + Royalty，PHY 贵于 Controller"],["安全 IP","加解密引擎、安全启动","Arm (TrustZone), Rambus, Intrinsic ID","License + Royalty"],["总线/互联 IP","片上互联 (NoC/AMBA)","Arteris, Arm (CoreLink), NetSpeed","License + Royalty"]]},{heading:"Arm 版税结构（边缘 SoC 最常见模式）",type:"bullets",items:["架构授权（Architecture License）：一次性费用，数千美元到数百万美元不等，允许自定义 CPU 核（如苹果、高通）。","核心授权（Core License）：按 CPU/GPU 核型号授权，前期费用+量产版税。Cortex-A55 量级核心授权费约数十万美元。","版税（Royalty）：每颗芯片出厂价的 1-3%。RK3566 量级 ~$0.3/颗，RK3588 量级 ~$1.5/颗。","Mali GPU 附加：GPU 核单独计费，版税叠加。","Popcorn 优惠：Arm Total Access 订阅制，年费覆盖多种 IP，适合多产品线公司。"]},{heading:"IP 选择关键考量",type:"bullets",items:["生态成熟度：Arm 生态最完善（工具链、OS 支持、开发者社区），RISC-V 成长快但生态仍在建设。","性能/功耗/面积 (PPA)：同等工艺下不同 IP 核的 PPA 差异明显，需根据应用场景选型。","授权成本：前期费用 vs 版税 vs 总拥有成本，需结合预期销量计算。量大时前期费摊销薄，选高 License 低 Royalty 方案；量小时反之。","地缘政治：美国出口管制 (EAR) 限制某些 IP 对中国企业的授权，RISC-V 开源架构有地缘优势。","技术支持质量：IP 厂商提供的集成支持、验证环境、驱动 SDK 完善度。"]},{heading:"RISC-V vs Arm 对比",type:"matrix",headers:["维度","Arm","RISC-V"],rows:[["指令集","私有，Arm 公司所有","开源免费，RISC-V International 维护"],["生态成熟度","★★★★★ 极完善","★★★☆☆ 快速发展中"],["授权模式","License + Royalty","开源，无需授权费，可自研核"],["定制能力","架构授权才可深度定制","天然支持扩展指令"],["工具链","Keil/DS-5/GCC/LLVM 完善","GCC/LLVM 已支持，IDE 追赶中"],["地缘风险","受美国/英国出口管制约束","开源不受管制（但实现 IP 可能有出口限制）"],["典型芯片","RK3566/RK3588、手机 SoC、车规 MCU","全志 D1、算能 SG2042、平头哥 玄铁"]]}]},EDA:{title:"EDA（电子设计自动化）— 芯片设计工具链",summary:"EDA 工具是芯片设计的\"CAD 软件\"——从前端 RTL 设计、逻辑综合、布局布线、物理验证到签核（Sign-off），覆盖全流程。全球 EDA 市场由 Synopsys、Cadence、Siemens EDA 三家主导（合占 ~75%），国产 EDA 在模拟和验证领域快速追赶。",sections:[{heading:"EDA 工具链全景",type:"table",headers:["阶段","任务","代表工具","主要厂商"],rows:[["前端设计","RTL 编写与仿真","VCS, Xcelium, Questa","Synopsys, Cadence, Siemens"],["逻辑综合","RTL→门级网表","Design Compiler, Genus","Synopsys, Cadence"],["DFT","可测试性设计","TetraMAX, Modus","Synopsys, Cadence"],["布局布线","门级网表→物理版图","IC Compiler II, Innovus","Synopsys, Cadence"],["物理验证","DRC/LVS 检查","Calibre, IC Validator","Siemens, Synopsys"],["寄生提取","RC 寄生参数提取","StarRC, Quantus","Synopsys, Cadence"],["静态时序分析","时序签核","PrimeTime, Tempus","Synopsys, Cadence"],["功耗分析","功耗估算与优化","PrimePower, Voltus","Synopsys, Cadence"],["模拟/混合信号","模拟 IC 设计仿真","Virtuoso, Custom Compiler","Cadence, Synopsys"],["仿真加速","大型设计硬件仿真","Palladium, ZeBu","Cadence, Synopsys"],["形式验证","等价性/属性检查","Formality, JasperGold","Synopsys, Cadence"],["PCB/封装","板级与封装设计","Allegro, Xpedition","Cadence, Siemens"]]},{heading:"EDA 商业模式",type:"bullets",items:["年度订阅（Subscription）：主流模式，按 seat/年收费，单工具年费从数千到数十万美元。","Token 制：按并行任务消耗 Token 计费，适合高峰期需要大量计算资源的企业。","全流程打包：三大家均提供\"全流程套件\"折扣，比单独购买便宜 30-50%。","云上 EDA：Synopsys Cloud / Cadence Cloud，按使用时长计费，降低中小企业的前期投入。","典型费用：一个 22nm 边缘 SoC 项目的 EDA 工具年度费用约 $500K-1.5M/年（含综合/布局布线/签核），分摊到每颗芯片就是 NRE 的一部分。"]},{heading:"国产 EDA 格局",type:"table",headers:["厂商","优势领域","代表产品","上市情况"],rows:[["华大九天 (Empyrean)","模拟全流程 / 面板设计","ALPS (仿真), Aether (版图)","A 股 688150"],["概伦电子 (Primarius)","器件建模 / SPICE 仿真","NanoSpice, BSIMProPlus","A 股 688206"],["芯华章 (X-EPIC)","数字验证","GalaxSim, GalaxFV","未上市"],["广立微 (Semitronix)","良率分析 / 测试芯片","DataExp, TCM","A 股 68835x"],["国微集团 (SMIT)","EDA 全流程","鸿鹄系列","未上市"],["鸿芯微纳","数字后端 / 布局布线","Aguda","未上市"]]},{heading:"为什么 EDA 这么贵？",type:"bullets",items:["研发投入巨大：Synopsys 年研发投入超 $1.5B，持续优化算法支持最新工艺节点。","工艺复杂度递增：3nm 规则数是 28nm 的 10 倍+，工具需处理海量设计规则。","Foundry 认证：每种工艺 PDK 都需 EDA 工具通过代工厂认证，壁垒极高。","人才稀缺：EDA 需要兼具 CS/EE/物理/数学背景的复合型工程师，全球仅数万人。","切换成本高：设计流程与 EDA 工深深绑定，迁移风险大，形成强锁定效应。"]}]},"EDA/IP":{title:"EDA + IP 综合厂商 — Synopsys & Cadence",summary:"Synopsys 和 Cadence 是仅有两家同时提供 EDA 工具和 IP 核的公司。这种\"工具+IP\"捆绑模式形成强大生态壁垒：设计公司用他们的 EDA 工具做芯片，同时购买他们的接口 IP（USB/PCIe/DDR），IP 已针对自家工具优化验证。",sections:[{heading:"Synopsys vs Cadence 全景对比",type:"matrix",headers:["维度","Synopsys (新思)","Cadence (楷登)"],rows:[["成立","1986，总部美国加州 Mountain View","1988，总部美国加州 San Jose"],["FY2024 营收","~$6.5B","~$4.2B"],["EDA 强项","逻辑综合 (DC)、物理实现 (ICC2)、STA (PT)、仿真 (VCS)","模拟仿真 (Spectre/Virtuoso)、PCB (Allegro)、硬件加速 (Palladium)"],["IP 强项","DesignWare (接口 IP 全球第一)、ARC 处理器","Tensilica DSP、Denali 存储器 IP"],["AI 战略","Synopsys.ai：AI 驱动设计优化 (DSO.ai)","Cadence.AI：JedAI, Cerebrus"],["中国市场","中国营收占比 ~15-18%，积极适配国产工艺","中国营收占比 ~15%，Tensilica DSP 广泛用于国产芯片"]]},{heading:"DesignWare 接口 IP 产品线 (Synopsys)",type:"table",headers:["接口类型","最高速率","工艺支持","应用场景"],rows:[["USB4 / USB 3.2","40 Gbps","N7~N3","PC、手机、扩展坞"],["PCIe 6.0 / 5.0","64 GT/s","N5~N3","服务器、AI 加速器、SSD"],["DDR5 / LPDDR5X","9600 Mbps","N7~N3","手机、PC、边缘 AI"],["HBM3 / HBM3E","9.6 Gbps/pin","N5~N3","AI 训练芯片、HPC"],["MIPI DSI/CSI","4.5 Gbps/lane","N7~N3","手机摄像头/显示屏"],["HDMI 2.1","48 Gbps","N7~N3","TV、机顶盒、显示器"],["Ethernet 800G","112 Gbps SerDes","N5~N3","数据中心交换机"]]},{heading:"为什么它们能同时做 EDA + IP？",type:"bullets",items:["协同验证优势：自有 IP 在自有 EDA 工具中已经过充分验证，客户集成风险低。","PPA 优化：IP 实现针对自有综合/布局布线工具做了专门优化。","一站式采购：芯片公司可同时谈 EDA License + IP License，获得打包折扣。","Foundry 绑定：DesignWare IP 已在 TSMC/Samsung 等主流工艺上 silicon-proven。","竞争壁垒：新进入者很难同时攻克 EDA 工具和 IP 两个高壁垒市场。"]}]},Foundry:{title:"晶圆代工 (Foundry) — 芯片制造的\"印刷厂\"",summary:"晶圆代工厂（Foundry）是芯片制造的核心环节。Fabless 设计公司完成设计后，将 GDS（版图文件）交付给代工厂，在硅片上通过光刻、刻蚀、沉积、掺杂等数百道工序制造芯片。TSMC 是全球绝对龙头（份额 ~60%），Samsung 和 Intel 追赶中，SMIC 是大陆最大代工厂。",sections:[{heading:"主要代工厂工艺节点对比",type:"table",headers:["代工厂","最先进量产节点","成熟节点","特色工艺","主要客户"],rows:[["TSMC (台积电)","N3E (3nm)","N7, N6, N5/N4P, 16FFC, 22ULL, 28HPC+","车规 N5A, RF, CIS, 嵌入式","Apple, NVIDIA, AMD, Qualcomm, 瑞芯微"],["Samsung Foundry","3GAE (GAA 3nm)","SF5, SF4, 8LPP, 14LPP","MRAM, 嵌入式, RF","Samsung LSI, NVIDIA (部分), Google Tensor"],["Intel Foundry","Intel 3 / 18A","Intel 4, Intel 7","EMIB, Foveros 先进封装","Intel 自身, 外部客户逐步导入"],["SMIC (中芯国际)","14nm FinFET (受限)","28HKC+, 22ULL, 55/40nm","BCD, 嵌入式 Flash, CIS","华为海思, 紫光展锐, 全志, 瑞芯微"],["UMC (联电)","22nm","28nm, 40nm, 55nm, 90nm","BCD, 嵌入式 Flash, HV","MediaTek, Realtek, 全志"],["GlobalFoundries","12nm LP","22FDX (FD-SOI), 28nm, 55nm","FD-SOI, 硅光子, GaN","AMD (历史), 车规/工规客户"],["HHGrace (华虹)","28nm","55/40nm","BCD, eFlash, 功率器件","电源管理, MCU, 车规"]]},{heading:"工艺选择关键参数",type:"bullets",items:["节点 (Node)：晶体管特征尺寸，28nm→22nm→12nm→8nm→6nm→3nm，越先进性能越高但成本也越高。","晶圆尺寸：主流 300mm (12 英寸)，成熟工艺也有 200mm (8 英寸)。300mm 每片产 Die 数更多。","晶圆价格：28nm ~$2,000-3,000/片，22nm ~$2,500/片，12nm ~$4,500/片，8nm ~$6,500/片，5nm ~$16,000/片。","MPW (多项目晶圆)：多个设计拼一片晶圆，分摊光罩和晶圆成本，适合原型验证和小批量。","产能保障：热门节点需提前锁定产能（Capacity Reservation），尤其是车规/工规芯片。","地缘风险：美国出口管制限制先进工艺设备对华出口，SMIC 的 14nm 以下扩产受限。"]},{heading:"22nm ULL vs 8nm LPP 成本对比（12 英寸晶圆）",type:"matrix",headers:["参数","22nm ULL (SMIC/UMC)","8nm LPP (Samsung)"],rows:[["晶圆单价","~$2,500","~$6,500"],["掩膜费用","~$1.5M","~$12M"],["典型 Die 面积","~60 mm² (RK3566)","~110 mm² (RK3588)"],["DPW (300mm 晶圆)","~1,050 颗","~540 颗"],["典型良率","~92% (成熟节点)","~85% (仍较低)"],["单颗 Die 成本","~$2.5-3.0","~$13-15"],["适合场景","中低端边缘 AIoT、平板、盒子","高端边缘 AI、NAS、8K 视频"]]}]},Mask:{title:"光罩/掩膜版 (Photomask) — 芯片制造的\"底片\"",summary:"光罩（又称掩膜版、Mask/Reticle）是光刻工艺中的\"照片底片\"——电路图案通过光罩投影到晶圆上。一套先进工艺的光罩组（Mask Set）包含数十层（每一层对应一道光刻工序），总价可达数百万至数千万美元，是 NRE 费用中最大单项。",sections:[{heading:"光罩基础知识",type:"table",headers:["概念","说明"],rows:[["Mask / Reticle","光罩，承载一层电路图案的石英板，表面镀铬形成遮光图案。"],["Mask Set","一套光罩组。28nm 约 40-50 层，7nm 约 80+ 层，3nm 超 100 层。"],["Reticle Size","光罩尺寸。DUV 通常为 6 英寸×6 英寸（约 152mm），EUV 为 6 英寸。"],["OPC (光学邻近修正)","对光罩图案做预畸变，补偿光刻衍射效应，提升精度。"],["PSM (相移光罩)","利用光相位干涉提高分辨率，成本是普通光罩的 2-3 倍。"],["EUV Mask","极紫外光罩，反射式（DUV 为透射式），多层 Mo/Si 反射膜，制造难度极高。"]]},{heading:"不同工艺节点的光罩成本",type:"table",headers:["工艺节点","层数（约）","Mask Set 总价（USD）","单层均价"],rows:[["90nm","30-35 层","$300K-500K","~$12K/层"],["65nm","35-40 层","$500K-800K","~$17K/层"],["40/45nm","40-45 层","$800K-1.5M","~$25K/层"],["28nm","45-50 层","$1.5M-3M","~$40K/层"],["22nm","50-55 层","$1.5M-2.5M","~$40K/层"],["12/14nm","55-65 层","$5M-8M","~$100K/层"],["7/8nm","65-75 层","$10M-15M","~$170K/层"],["5nm","75-85 层","$15M-25M","~$230K/层"],["3nm","85-100+ 层","$25M-50M+","~$350K+/层"]]},{heading:"光罩产业链",type:"bullets",items:["光罩制造厂（Mask Shop）：Photronics (美国), DNP/大日本印刷 (日本), Toppan/凸版印刷 (日本) 三大家主导。","代工厂自营 Mask Shop：TSMC、Intel、Samsung 都有内部光罩厂，用于先进工艺。","光罩设备：光罩写入（EBL，电子束光刻机）由 NuFlare、JEOL 供应；检测设备由 KLA、Lasertec（EUV 检测龙头）供应。","光罩基板（Mask Blank）：石英基板+铬膜+光刻胶，主要由 HOYA、AGC 供应。EUV Mask Blank 更有 40+ 层 Mo/Si 反射膜，制造难度极高。","国产进展：清溢光电、路维光电可供应 28nm/250nm 以上光罩，先进节点光罩仍依赖进口。"]}]},Wafer:{title:"硅片 (Silicon Wafer) — 芯片的\"地基\"",summary:"硅片（Wafer）是晶圆制造的基础材料，从多晶硅提纯→拉单晶（CZ 法）→切割→研磨→抛光→外延（可选）制成。全球硅片市场由日本信越化学和 SUMCO 主导（合计 ~55%），台湾环球晶圆第三。12 英寸（300mm）是先进工艺主流，8 英寸用于成熟工艺和特色芯片。",sections:[{heading:"硅片类型",type:"table",headers:["类型","说明","典型用途","溢价"],rows:[["抛光片 (Polished)","基础硅片，CMP 抛光表面","Logic/DRAM 大多数层","基准价"],["外延片 (EPI)","在抛光片上生长单晶外延层","模拟/功率/高压 IC","+30~60%"],["SOI (Silicon-On-Insulator)","埋氧化层隔离，减少漏电","RF/低功耗/耐辐射","+100~200%"],["退火片 (Annealed)","高温退火消除缺陷","高端 CIS 图像传感器","+20~40%"]]},{heading:"12 英寸 vs 8 英寸 vs 6 英寸",type:"matrix",headers:["参数","300mm (12 英寸)","200mm (8 英寸)","150mm (6 英寸)"],rows:[["面积比","1× (基准)","2.25× 面积 → 1片12寸=2.25片8寸","4×"],["主流工艺","28nm 及以下先进工艺","90nm-0.13μm 成熟工艺","0.18μm+ 特色工艺"],["硅片单价","~$100-200/片","~$40-80/片","~$20-35/片"],["产能","紧缺（先进工艺需求大）","供需均衡","逐步萎缩"],["主要应用","手机 SoC、CPU、GPU、AI","电源 IC、MCU、CIS、MEMS","功率器件、传感器"]]},{heading:"硅片成本因素",type:"bullets",items:["多晶硅原料：从冶金级硅→西门子法提纯至 9N-11N（99.9999999%-99.999999999%），电子级多晶硅占硅片成本 ~30%。","拉晶 (Crystal Pulling)：CZ 法拉制单晶硅锭（Ingot），耗时 2-3 天/根，直径越大难度越大。","切割与研磨：线切割成片→双面研磨→边缘倒角→CMP 抛光，多道工序。","外延工艺：如需 EPI 层，在表面生长数 μm 单晶硅（CVD 工艺），增加成本。","检测分选：激光/光学检测缺陷 (COP, BMD, 位错)，按质量等级分选 Bin1/Bin2/Bin3。"]},{heading:"全球硅片格局",type:"table",headers:["厂商","国别","全球份额","产品特色"],rows:[["信越化学 (Shin-Etsu)","日本","~30%","300mm 抛光/EPI/SOI 全品类"],["SUMCO","日本","~25%","300mm 抛光/EPI 高质量"],["环球晶圆 (GlobalWafers)","中国台湾","~17%","收购 Siltronic (德国) 后跃居第三"],["Siltronic","德国","~13%","被环球晶圆收购，300mm 主力"],["SK Siltron","韩国","~10%","SK 集团旗下，服务三星/SK Hynix"],["沪硅产业 (NSIG)","中国大陆","~3%","国产 300mm 硅片龙头，SOI 领先"],["立昂微 (SinoWafer)","中国大陆","~2%","8-12 寸抛光/外延片"]]}]},OSAT:{title:"封装测试 (OSAT) — 芯片的\"包装与体检\"",summary:"OSAT（Outsourced Semiconductor Assembly and Test）是芯片封装和测试的外包服务商。Fabless 公司将代工厂生产的晶圆交给 OSAT 进行划片（Dicing）、贴片（Die Bonding）、引线键合（Wire Bonding）/倒装（Flip Chip）、注塑、植球、测试等工序。全球 OSAT 龙头是日月光（ASE），大陆龙头是长电科技（JCET）。",sections:[{heading:"主要封装形式对比（边缘 SoC 常用）",type:"table",headers:["封装形式","说明","典型 Pin 数","封装单价","适用芯片"],rows:[["QFN (Quad Flat No-lead)","无引线四方扁平封装，底面露焊盘","16-88","$0.15-0.50","MCU、电源 IC、WiFi/BT"],["LFBGA (Low-profile Fine-pitch BGA)","薄型细间距球栅阵列","100-400","$0.40-1.00","RK3566、平板 SoC、中低端 AP"],["FCBGA (Flip-Chip BGA)","倒装芯片 BGA，高性能/高功耗","400-2,000+","$1.50-5.00","RK3588、手机 AP、AI 加速器"],["SiP (System-in-Package)","系统级封装，多芯片集成","视集成度","$1.00-10.00","智能手表、TWS 耳机、IoT 模组"],["WLCSP (Wafer-Level CSP)","晶圆级芯片级封装，最小尺寸","4-50","$0.10-0.40","CIS 传感器、小型传感器"],["MCM (Multi-Chip Module)","多芯片模块，2.5D/3D 堆叠","视规模","$5.00-100+","HBM+GPU、AI 训练芯片"]]},{heading:"封装工艺流程",type:"bullets",items:["晶圆减薄 (Back-grinding)：将晶圆从 ~780μm 减薄至 ~100-200μm，满足薄型封装需求。","划片 (Dicing)：用金刚石刀片或激光将晶圆切割成单颗 Die。","贴片 (Die Attach)：将 Die 用银浆/焊料/DAF 粘贴到基板或引线框上。","引线键合 (Wire Bonding) 或 倒装 (Flip Chip)：WB 用金线/铜线连接 Die→基板；FC 用焊球直接倒装。","注塑 (Molding)：环氧树脂注塑包封，保护芯片。","植球 (Ball Mount)：BGA 封装需在底面植锡球阵列。","打标 (Marking)：激光打标型号/批次/日期码。","切单 (Singulation)：将连片切分为单颗成品。"]},{heading:"全球主要 OSAT 厂商",type:"table",headers:["厂商","地区","2023 营收","强项"],rows:[["日月光 (ASE)","中国台湾","~$20B","FCBGA, SiP, 车规封装，全球第一"],["安靠 (Amkor)","美国/韩国","~$6.5B","先进封装, MCM, Chiplet"],["长电科技 (JCET)","中国大陆","~$4-5B","FCBGA, XDFOI 2.5D, SiP, 含星科金朋"],["通富微电 (Tongfu)","中国大陆","~$3B","FCBGA, AMD 主力封装伙伴"],["力成 (PTI)","中国台湾","~$2.5B","存储封装, SiP"],["华天科技 (HuaTian)","中国大陆","~$2B","QFN, FCBGA, SiP, MEMS"],["晶方科技 (China WLCSP)","中国大陆","~$0.5B","CIS WLCSP 专家, 12 寸 TSV"]]}]},Substrate:{title:"封装基板 (IC Substrate) — 芯片的\"PCB 微型版\"",summary:"封装基板（Package Substrate）是连接芯片 Die 与 PCB 主板之间的\"微型电路板\"。它为 Die 提供机械支撑、电气连接和散热路径。基板按材料分为 BT（Bismaleimide Triazine，成本低但高频性能差）和 ABF（Ajinomoto Build-up Film，适合细线路/高速信号）。FCBGA 封装是基板消耗最大的品类。",sections:[{heading:"基板类型对比",type:"table",headers:["类型","材料","最小线宽/间距","层数","适用封装","相对成本"],rows:[["BT 基板","BT 树脂+玻纤","~15/15μm","2-6 层","LFBGA、QFN、MEMS","1×（基准）"],["ABF 基板 (标准)","ABF 膜层+铜","~8/8μm","6-12 层","FCBGA (中端)","3-5×"],["ABF 基板 (高端)","ABF 膜层+铜","~5/5μm","12-20 层","FCBGA (高端/大尺寸)","8-15×"],["MIS 基板","模塑互连基板","~20/20μm","2-4 层","QFN, SiP, 功率封装","0.5-1×"],["陶瓷基板","Al₂O₃/AlN 陶瓷","~50/50μm","多层","RF/微波、高可靠封装","5-20×"],["硅中介层 (Interposer)","硅晶圆","~0.4/0.4μm","单层+TSV","2.5D Chiplet (HBM+GPU)","50-200×"]]},{heading:"ABF 基板：为什么是瓶颈？",type:"bullets",items:["ABF 材料由味之素 (Ajinomoto) 独家供应，全球仅此一家。虽然味之素持续扩产，但需求增长更快。","ABF 基板产能集中在日本（Ibiden、Shinko）和台湾（Unimicron、Kinsus、Nan Ya），大陆刚起步。","大尺寸 FCBGA 基板（>70mm×70mm）制造难度极高：翘曲控制、细线路良率、层间对位精度。","AI/GPU 芯片（NVIDIA H100/B200 等）大量消耗高端 ABF 基板产能，挤压边缘 SoC 供给。","国产替代：深南电路 (SCC)、兴森科技 (Fastprint)、珠海越亚 (Access) 正在建设 ABF 基板产线，目前以 BT 为主。"]},{heading:"基板成本驱动因素",type:"bullets",items:["层数（Layer Count）：FCBGA 基板 6-20 层，每增 2 层成本增 20-40%。","尺寸（Body Size）：大尺寸基板制造难度和材料消耗均增大，成本非线性增长。","线宽/间距（L/S）：细线路需要更贵的 ABF 膜和更先进的光刻/激光钻孔设备。","材料选择：ABF vs BT 成本差 3-5×；Low-CTE 芯板、低损耗介质推高材料成本。","良率：大面积基板翘曲/分层缺陷导致良率下降，成熟产品良率 85-95%，新产品可能低于 70%。"]}]},ATE:{title:"ATE（自动化测试设备）— 芯片质量的\"守门员\"",summary:"ATE（Automated Test Equipment）是芯片测试的专用设备。每颗芯片在晶圆阶段（CP，Chip Probe）和成品阶段（FT，Final Test）都需要通过 ATE 测试电性能、功能、时序、功耗等。全球 ATE 市场由 Teradyne 和 Advantest 双寡头主导（合计 ~70%），国产长川科技和华峰测控在模拟/功率测试领域快速追赶。",sections:[{heading:"ATE 测试类型与设备",type:"table",headers:["测试类型","阶段","测试内容","代表设备","机时单价"],rows:[["CP (Chip Probe)","晶圆级, 封装前","Die 基本功能/电性筛选","探针台 + ATE","$0.05-0.30/颗"],["FT (Final Test)","封装后, 成品","全功能/全参数/全温度测试","Handler + ATE","$0.10-0.80/颗"],["SLT (System-Level Test)","成品级","跑真实应用场景 (如安卓启动)","SLT 平台","$0.50-3.00/颗"],["Burn-in (老化)","成品级","高温高压加速老化筛缺陷","老化炉","$0.20-1.00/颗"],["ATE 机时费","通用","按秒计费","—","$100-400/小时"]]},{heading:"Teradyne vs Advantest",type:"matrix",headers:["维度","Teradyne (泰瑞达)","Advantest (爱德万)"],rows:[["总部","美国马萨诸塞州","日本东京"],["2023 营收","~$2.7B","~$3.5B"],["SoC 测试主力","UltraFLEX 系列","V93000 系列"],["存储测试主力","Magnum 系列","T5851/T5833 系列"],["强项","SoC 测试、模拟测试","存储测试、HBM 测试"],["中国市场","受限出口管制","部分高端受限"]]},{heading:"测试成本构成",type:"bullets",items:["测试时间：SoC 测试时间从数秒到数分钟不等。高端芯片测试项多、时间长。","机台折旧：一台 V93000 约 $1-2M，5 年折旧，每小时成本 $50-100。","Handler/Prober：自动化上下料设备，$100K-500K/台。","Load Board / Probe Card：每款芯片定制的测试接口板，$10K-100K+。","测试厂人工/厂房：洁净室环境，工程师编写和调试测试程序。","并行测试 (Multi-site)：同时测 2/4/8/16 颗，成倍降低单颗测试时间。"]}]},Memory:{title:"存储芯片 (Memory) — DRAM / NAND / NOR",summary:"存储芯片是边缘 SoC 最重要的配套器件之一。DRAM（内存）提供系统运行内存，NAND Flash/eMMC/UFS 提供持久存储，NOR Flash 用于代码存储（XIP，就地执行）。存储芯片通常与 SoC 在同一 PCB 上，由 OEM/方案商采购配套，不在 SoC 本身的封装内（SiP 除外）。",sections:[{heading:"存储类型对比",type:"table",headers:["类型","容量范围","速度","用途","典型单价"],rows:[["LPDDR4X","1-8 GB","4266 Mbps","手机/平板/边缘 AI 运行内存","$3-15/颗"],["LPDDR5/5X","4-16 GB","6400-8533 Mbps","旗舰手机/AI 加速器运行内存","$8-30/颗"],["DDR4","2-16 GB","3200 Mbps","工控/PC/NAS 运行内存","$5-20/颗"],["eMMC 5.1","8-256 GB","~400 MB/s","平板/盒子/工控持久存储","$3-20/颗"],["UFS 2.2/3.1","64-512 GB","~2 GB/s","高端平板/手机持久存储","$8-40/颗"],["NOR Flash","1-512 Mb","~100 MB/s (读)","代码存储 (XIP)、启动固件","$0.10-2.00/颗"],["SLC NAND","1-8 Gb","~40 MB/s","工控/车规代码+数据存储","$0.50-3.00/颗"]]},{heading:"存储市场格局",type:"table",headers:["领域","全球龙头","中国大陆代表"],rows:[["DRAM","Samsung (~40%), SK Hynix (~30%), Micron (~25%)","CXMT (长鑫存储) - 已量产 DDR4/LPDDR4X"],["NAND Flash","Samsung, Kioxia, WD/SanDisk, SK Hynix, Micron","YMTC (长江存储) - 232 层 Xtacking 领先"],["NOR Flash","Winbond, Macronix, GigaDevice, Infineon/Cypress","GigaDevice (兆易创新) - 全球 Top 3"],["eMMC/UFS/SSD 模组","Samsung, WD/SanDisk, Kingston","Longsys (江波龙), Biwin (佰维), Kimtigo"]]},{heading:"边缘 SoC 存储选型建议",type:"bullets",items:["成本敏感型（如 RK3566 平板/盒子）：LPDDR4X 2-4GB + eMMC 5.1 32-64GB，存储总成本 ~$8-12。","性能型（如 RK3588 边缘 AI）：LPDDR5 8-16GB + UFS 3.1 128-256GB，存储总成本 ~$30-60。","工控/车规：DDR4 + SLC NAND/NOR Flash（高可靠性/宽温），车规分级存储溢价 50-200%。","AI 推理：大模型推理需要大容量 LPDDR5（8GB+），bandwidth 是关键瓶颈。","国产化要求：DRAM→CXMT，NAND→YMTC，NOR→GigaDevice，eMMC→Longsys/Biwin。"]}]},Equipment:{title:"前道设备 (Equipment) — 芯片制造的工具链",summary:"半导体前道设备（Wafer Fab Equipment, WFE）是晶圆制造中使用的各种工艺设备。从光刻、刻蚀、沉积到检测，每条产线需要数百台设备，投资动辄数十亿至数百亿美元。ASML 垄断 EUV 光刻机，应用材料 (AMAT) 和 Lam Research 主导刻蚀/沉积，KLA 主导检测。国产设备在刻蚀/清洗/CMP 等领域快速突破。",sections:[{heading:"前道设备分类与龙头",type:"table",headers:["设备类型","作用","全球龙头","国产代表","国产化率"],rows:[["光刻 (Lithography)","将电路图案转移到晶圆上","ASML (EUV/DUV), Nikon, Canon","SMEE (上海微电子)","<5%（先进节点）"],["刻蚀 (Etch)","去除材料，形成电路结构","Lam Research, AMAT, TEL","AMEC (中微), NAURA","~20-25%"],["沉积 (Deposition)","在晶圆上生长薄膜 (CVD/PVD/ALD)","AMAT, Lam, TEL","NAURA, Piotech (拓荆)","~15-20%"],["CMP (化学机械抛光)","平坦化晶圆表面","AMAT, Ebara","Hwatsing (华海清科)","~20-25%"],["清洗 (Cleaning)","去除颗粒/污染物","SCREEN, TEL, Lam","ACMR (盛美), NAURA","~25-30%"],["离子注入 (Implant)","掺杂杂质改变电性","AMAT, Axcelis","NAURA, CETC 48 所","~10-15%"],["检测 (Inspection/Metrology)","缺陷检测/量测","KLA, AMAT, Onto","中科飞测, 上海精测","~10-15%"],["热处理 (Thermal)","退火/氧化/扩散","TEL, Kokusai, AMAT","NAURA, ACMR","~20-25%"]]},{heading:"ASML 光刻机全家福",type:"table",headers:["型号","类型","光源波长","分辨率","产能 (WPH)","单价 (USD)"],rows:[["EXE:5000/5200","High-NA EUV","13.5 nm","8 nm","~185","~$350-400M"],["NXE:3800E","EUV (0.33 NA)","13.5 nm","13 nm","~220","~$180-200M"],["NXT:2100i","DUV 浸没式 (ArFi)","193 nm","38 nm","~295","~$65-80M"],["NXT:2050i","DUV 浸没式 (ArFi)","193 nm","40 nm","~295","~$55-70M"],["NXT:870","DUV 干式 (ArF)","193 nm","~65 nm","~330","~$30-40M"]]},{heading:"设备采购成本（月产 40K 片的先进逻辑产线）",type:"bullets",items:["光刻区域：~20-25 台扫描光刻机 + 配套涂胶显影 (TEL/SCREEN Track)，占设备总投资的 ~25-30%。","刻蚀区域：~150-200 台刻蚀机（介质/硅/金属刻蚀各类型），占设备总投资的 ~20-25%。","沉积区域：~120-160 const STORAGE_KEY = 'chip-cost-edits-v1';
function loadEdits(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return {};}
}
function saveAll(){
  const data = {DOMAINS,COST_ITEMS,SUPPLIERS,TARGET_CHIPS,GLOSSARY,PACKAGE_FORMATS,WAFER_PRICES};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  toast('已保存到本地。');
}
function applyEdits(){
  const e = loadEdits();
  if(!e||!Object.keys(e).length) return;
  // 覆盖同 id 项，补充新增项
  const merge=(arr,patches,idKey='id')=>{
    if(!patches) return;
    const map = new Map(arr.map(o=>[o[idKey],o]));
    patches.forEach(p=>map.set(p[idKey],p));
    arr.length=0; map.forEach(v=>arr.push(v));
  };
  merge(DOMAINS,e.DOMAINS);
  merge(COST_ITEMS,e.COST_ITEMS);
  merge(SUPPLIERS,e.SUPPLIERS);
  merge(GLOSSARY,e.GLOSSARY,'term');
  merge(PACKAGE_FORMATS,e.PACKAGE_FORMATS);
  if(e.WAFER_PRICES){WAFER_PRICES.length=0;e.WAFER_PRICES.forEach(r=>WAFER_PRICES.push(r));}
  if(e.TARGET_CHIPS){Object.keys(e.TARGET_CHIPS).forEach(k=>TARGET_CHIPS[k]=e.TARGET_CHIPS[k]);
    // 允许删除 - 如果保存记录中某 chip 被删，则在运行时从默认中移除
    const removed = e.__removedChips||[];
    removed.forEach(id=>delete TARGET_CHIPS[id]);
  }
}
function resetAll(){
  if(!confirm('确定要全部恢复默认数据吗？该操作不可撤销。')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function getCollection(type){
  return ({domain:DOMAINS,item:COST_ITEMS,supplier:SUPPLIERS,glossary:GLOSSARY,pkg:PACKAGE_FORMATS,wafer:WAFER_PRICES})[type];
}
function getRecord(type,id){
  if(type==='chip') return TARGET_CHIPS[id];
  const arr = getCollection(type); if(!arr) return null;
  const sc = SCHEMA[type];
  return arr.find(o=>o[sc.idKey]===id);
}
function openEditor(type,record){
  const sc = SCHEMA[type]; if(!sc) return;
  const editing = !!record;
  const draft = record?JSON.parse(JSON.stringify(record)):{};
  // pct[0]/[1] 特殊处理
  if(type==='domain'&&!draft.pct) draft.pct=[0,0];
  $('#editTitle').textContent = (editing?'编辑':'新建')+' · '+sc.title;
  const body = $('#editBody'); body.innerHTML='';
  body.classList.add('calc-form');
  sc.fields.forEach(f=>{
    const lab = el('label',{},f.l+(f.req?' *':''));
    let inp;
    let cur = f.k.includes('[')? draft.pct[parseInt(f.k.match(/\[(\d)\]/)[1])] : draft[f.k];
    if(f.type==='textarea'){
      inp = el('textarea',{rows:3,style:'width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink)'});
      inp.value = cur||'';
    } else if(f.type==='select'){
      inp = el('select');
      f.opts().forEach(o=>{const oe=el('option',{value:o.v},o.l); if(o.v===cur) oe.selected=true; inp.append(oe);});
    } else if(f.type==='csv'){
      inp = el('input',{type:'text',value:Array.isArray(cur)?cur.join(','):(cur||'')});
    } else {
      inp = el('input',{type:f.type==='number'?'number':'text',step:'any',value:cur??''});
    }
    inp.dataset.k = f.k; inp.dataset.t = f.type||'text';
    body.append(lab,inp);
  });
  $('#editSave').onclick = ()=>{
    const obj = editing?record:{};
    body.querySelectorAll('[data-k]').forEach(el2=>{
      const k = el2.dataset.k, t = el2.dataset.t;
      let v = el2.value;
      if(t==='number') v = v===''?null:parseFloat(v);
      else if(t==='csv') v = v?v.split(',').map(s=>s.trim()).filter(Boolean):[];
      if(k.includes('[')){
        const i = parseInt(k.match(/\[(\d)\]/)[1]);
        if(!obj.pct) obj.pct=[0,0];
        obj.pct[i] = v||0;
      } else { obj[k] = v; }
    });
    if(!editing){
      if(type==='chip'){
        if(!obj.name){alert('型号名不能为空');return;}
        TARGET_CHIPS[obj.name]=obj;
      } else {
        const arr = getCollection(type), idKey=sc.idKey;
        if(!obj[idKey]){alert(idKey+' 不能为空');return;}
        if(arr.find(o=>o[idKey]===obj[idKey])){alert('已存在相同 '+idKey);return;}
        arr.push(obj);
      }
    }
    saveAll(); closeEditor(); buildChipPicker(); render();
  };
  $('#editModal').classList.add('show');
}
function closeEditor(){$('#editModal').classList.remove('show');}
function deleteRecord(type,id){
  if(!confirm('确定删除吗？')) return;
  if(type==='chip'){
    delete TARGET_CHIPS[id];
    const e = loadEdits(); e.__removedChips=(e.__removedChips||[]).concat(id); localStorage.setItem(STORAGE_KEY,JSON.stringify(e));
    if(STATE.chip===id) STATE.chip = Object.keys(TARGET_CHIPS)[0];
  } else {
    const arr = getCollection(type), sc = SCHEMA[type];
    const i = arr.findIndex(o=>o[sc.idKey]===id);
    if(i>=0) arr.splice(i,1);
  }
  saveAll(); buildChipPicker(); render();
}
function toast(msg){
  let t = $('#toast');

  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity='0',1400);

/* ========== 3. UTILS ========== */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmt = (n,d=2) => (n==null||isNaN(n))?'—':Number(n).toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtInt = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('en-US');
const fmtUsd = n => '$ '+fmt(n);
const domainOf = id => DOMAINS.find(d=>d.id===id);
const supplierOf = id => SUPPLIERS.find(s=>s.id===id);
const itemsByDomain = id => COST_ITEMS.filter(i=>i.domainId===id);
// 把 9 颗芯片粗分成两类，对应 DOMAINS.pct 的 [0]/[1] 列
// 0 = 22/28/40nm 成熟工艺；1 = 12nm 及以下先进工艺
function chipIdx(chipId){
  const c = TARGET_CHIPS[chipId]; if(!c) return 0;
  return /(?:^|[^0-9])(3|4|5|6|7|8|10|12|14|16)nm/.test(String(c.node))?1:0;
}

/* ========== 4. FORMULAS ========== */
function computeDPW(dieAreaMm2, waferDiamMm=300){
  const S = dieAreaMm2, D = waferDiamMm;
  return Math.PI*Math.pow(D/2,2)/S - Math.PI*D/Math.sqrt(2*S);
}
function computeYield(dieAreaMm2, d0PerCm2){
  const A = dieAreaMm2/100; // mm² -> cm²
  const x = A*d0PerCm2;
  if(x<=0) return 1;
  return Math.pow((1-Math.exp(-x))/x,2);
}
function computeUnitCost(p){
  const dpw = computeDPW(p.dieAreaMm2);
  const y = computeYield(p.dieAreaMm2, p.d0);
  const gdw = dpw*y;
  const dieCost = p.waferPriceUsd/gdw;
  const nrePerUnit = p.maskSetUsd/p.annualVolume;
  const base = dieCost + p.pkgUsd + p.testUsd + p.royaltyUsd + nrePerUnit;
  const unit = base*(1+p.overheadPct/100);
  return {dpw,y,gdw,dieCost,nrePerUnit,base,unit};
}

function setTab(tab){

    case 'packages': m.append(renderPackages()); break;
    case 'wafer':    m.append(renderWafer()); break;
    case 'chips':    m.append(renderChips()); break;
  }
}

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.append(c.nodeType?c:document.createTextNode(c));
  });
  return e;
}

      // connector
      const path = document.createElementNS(svgNS,'path');
      path.setAttribute('d',`M210 ${y} C ${(210+x)/2} ${y}, ${(210+x)/2} ${gy+12}, ${x} ${gy+12}`);
      path.setAttribute('stroke',domColor(d.id)); path.setAttribute('stroke-width','1.5'); path.setAttribute('fill','none'); path.setAttribute('opacity','.5');
      svg.append(path);
      const rr = document.createElementNS(svgNS,'rect');
      rr.setAttribute('x',x); rr.setAttribute('y',gy); rr.setAttribute('width',180); rr.setAttribute('height',24);
      rr.setAttribute('rx',6); rr.setAttribute('fill','var(--chip)'); rr.setAttribute('stroke',domColor(d.id)); rr.setAttribute('stroke-opacity','.4');
      rr.style.cursor='pointer';
      rr.addEventListener('click',()=>openItemDrawer(it));
      const tt = document.createElementNS(svgNS,'text');
      tt.setAttribute('x',x+10); tt.setAttribute('y',gy+16);
      tt.setAttribute('fill','currentColor'); tt.setAttribute('font-size','11');
      tt.textContent = it.name;
      svg.append(rr,tt);
    });
  });
  card.append(svg);
  card.append(el('div',{class:'hint',style:'margin-top:6px'},'点击任意节点打开详情抽屉。'));
  return card;
}

    const o = el('option',{value:r},r); if(STATE.supplierFilterRegion===r) o.selected=true; selRegion.append(o);

  // Grouped cards
  const filtered = SUPPLIERS
    .filter(s=>!STATE.supplierFilterLayer||s.layer===STATE.supplierFilterLayer)
    .filter(s=>!STATE.supplierFilterRegion||s.region===STATE.supplierFilterRegion);
  const groups = {};

  const orderedLayers = ['IP','EDA','EDA/IP','Foundry','Mask','Wafer','OSAT','Substrate','ATE','Memory','Equipment','Fabless'];
  const present = [...orderedLayers,...Object.keys(groups).filter(l=>!orderedLayers.includes(l))];
  present.forEach(layer=>{

    const card = el('div',{class:'group-card'});
    const head = el('div',{class:'group-head'});
    head.append(el('h3',{},`${layerNames[layer]||layer} · ${groups[layer].length}`));
    head.append(el('span',{class:'tag'},layer));

    card.append(head);

      ops.append(el('button',{class:'btn sm danger',onclick:e=>{e.stopPropagation();deleteRecord('supplier',s.id);}},'×'));
      tile.append(ops);
      grid.append(tile);
    });
    card.append(grid);
    wrap.append(card);
  });
  return wrap;
}
function openSupplierDrawer(s){
  const body = $('#drawerBody'); body.innerHTML='';
  body.append(el('div',{class:'breadcrumb'},`L4 · ${s.layer}`));
  body.append(el('h3',{},s.name));
  body.append(el('div',{class:'sub'},s.role||''));

  // 高亮信息条
  const meta = el('div',{class:'grid cols-2',style:'margin-top:10px;gap:8px'});
  meta.append(miniRow('环节',el('span',{class:'tag '+(s.layer||'').toLowerCase().replace(/[^a-z]/g,'')},s.layer||'—')));
  meta.append(miniRow('地区',(s.region||'—')+(s.hq?' · '+s.hq:'')));
  if(s.founded) meta.append(miniRow('成立年',s.founded+''));
  if(s.website){
    const a = el('a',{href:(s.website.startsWith('http')?s.website:'https://'+s.website),target:'_blank',style:'color:var(--brand);text-decoration:underline'},s.website);
    meta.append(miniRow('官网',a));

  body.append(meta);

  // 能力清单
  const caps = Array.isArray(s.capabilities)?s.capabilities:(s.capabilities?String(s.capabilities).split(/[,，]/):[]);
  if(caps.length){
    body.append(el('h3',{style:'margin-top:14px'},'能力清单'));
    const lg = el('div',{class:'legend'});
    caps.forEach(c=>lg.append(el('span',{class:'tag',style:'background:var(--chip);color:var(--ink)'},c.trim())));
    body.append(lg);
  }

  // 代表产品/型号
  const prods = Array.isArray(s.products)?s.products:(s.products?String(s.products).split(/[,，]/):[]);
  if(prods.length){
    body.append(el('h3',{style:'margin-top:14px'},'代表产品 / 型号'));
    const ul = el('div',{style:'display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px'});

      const it = el('div',{style:'padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px'},p.trim());

  }

  if(s.notes){
    body.append(el('h3',{style:'margin-top:14px'},'备注'));

  }

  // 驱动的成本项
  const related = COST_ITEMS.filter(i=>i.supplierIds&&i.supplierIds.includes(s.id));
  if(related.length){
    body.append(el('h3',{style:'margin-top:14px'},'驱动的成本项'));
    const list = el('div',{class:'legend'});
    related.forEach(it=>{
      list.append(el('a',{class:'tag',style:'cursor:pointer',onclick:()=>openItemDrawer(it)},it.name));
    });

  // 底部操作
  const ops = el('div',{style:'margin-top:18px;display:flex;gap:8px'});
  ops.append(el('button',{class:'btn',onclick:()=>{hideDrawer();openEditor('supplier',s);}},'✎ 编辑该供应商'));
  ops.append(el('button',{class:'btn danger',onclick:()=>{hideDrawer();deleteRecord('supplier',s.id);}},'× 删除'));
  body.append(ops);
  showDrawer();
}

/* ========== 11. RENDER: CALCULATOR ========== */
function renderCalc(){
  const wrap = el('div');
  wrap.append(el('div',{class:'breadcrumb'},'工具 · Tools'));
  wrap.append(el('h1',{},'成本计算器'));
  wrap.append(el('div',{class:'sub'},'以 '+STATE.chip+' 默认参数为起点，修改输入后右侧实时更新。'));

  const grid = el('div',{class:'grid cols-2',style:'margin-top:14px'});

  // Form
  const form = el('div',{class:'card calc-form'});
  form.append(el('h3',{},'输入参数'));
  const p = STATE.calc || {...TARGET_CHIPS[STATE.chip]};
  STATE.calc = p;
  const add = (key,label,step='any')=>{
    const l = el('label',{},label);
    const inp = el('input',{type:'number',step,value:p[key]});
    inp.addEventListener('input',()=>{p[key]=parseFloat(inp.value)||0;update();});
    form.append(l,inp);
  };
  add('dieAreaMm2','Die 面积 (mm²)','0.1');
  add('waferPriceUsd','12 英寸晶圆单价 (USD)','10');
  add('d0','缺陷密度 D0 (/cm²)','0.01');
  add('maskSetUsd','掩膜版一次性 (USD)','100000');
  add('pkgUsd','封装单颗 (USD)','0.01');
  add('testUsd','测试单颗 (USD)','0.01');
  add('royaltyUsd','IP 版税单颗 (USD)','0.01');
  add('overheadPct','综合费用 % (物流/RMA/毛利)','0.5');
  add('annualVolume','预期年销量 (颗)','100000');

  // Output
  const out = el('div',{class:'card'});
  out.append(el('h3',{},'输出'));
  const kpiRow = el('div',{class:'grid cols-2'});
  const kpiUnit = kpi('单颗出厂成本 (USD)','','');
  const kpiDie = kpi('Die 成本 (USD)','','');
  kpiRow.append(kpiUnit,kpiDie);
  out.append(kpiRow);
  const rows = el('div',{style:'margin-top:10px'});
  const rowDefs = [
    ['DPW 每片出 Die','dpw',0],
    ['良率 Yield','yPct',1],
    ['好 Die / 片','gdw',0],
    ['NRE 单颗摊销','nre',4],
    ['封装 + 测试 + 版税','pkgtir',3],
    ['基础成本（×1+Overhead 前）','base',3]
  ];
  const rowEls={};
  rowDefs.forEach(([l,k])=>{
    const r = el('div',{class:'out-row'});
    r.append(el('span',{},l)); const b = el('b'); r.append(b);
    rowEls[k]=b; rows.append(r);
  });
  out.append(rows);
  const pieMount = el('div',{style:'margin-top:10px'}); out.append(pieMount);
  out.append(el('div',{class:'hint',style:'margin-top:10px'},'敏感度（相对当前单颗成本）：'));
  const sensMount = el('div'); out.append(sensMount);

  grid.append(form,out);
  wrap.append(grid);

  function update(){
    const r = computeUnitCost(p);
    kpiUnit.querySelector('.val').textContent = fmt(r.unit);
    kpiUnit.querySelector('.hint').textContent = `毛利率@ASP=$${fmt(r.unit*1.3,2)} → 23%`;
    kpiDie.querySelector('.val').textContent = fmt(r.dieCost);
    kpiDie.querySelector('.hint').textContent = `GDW ${fmtInt(r.gdw)}`;
    rowEls.dpw.textContent = fmtInt(r.dpw);
    rowEls.yPct.textContent = fmt(r.y*100,1)+' %';
    rowEls.gdw.textContent = fmtInt(r.gdw);
    rowEls.nre.textContent = '$ '+fmt(r.nrePerUnit,4);
    rowEls.pkgtir.textContent = '$ '+fmt(p.pkgUsd+p.testUsd+p.royaltyUsd,3);
    rowEls.base.textContent = '$ '+fmt(r.base,3);
    // pie by actual components
    pieMount.innerHTML='';
    const unit = r.unit;
    const overhead = r.unit - r.base;
    const slices = [
      {label:'D1 Die',value:r.dieCost/unit*100,color:domColor('D1')},
      {label:'D2 Package',value:p.pkgUsd/unit*100,color:domColor('D2')},
      {label:'D3 Test',value:p.testUsd/unit*100,color:domColor('D3')},
      {label:'D4 NRE',value:r.nrePerUnit/unit*100,color:domColor('D4')},
      {label:'D5 IP+Overhead',value:(p.royaltyUsd+overhead)/unit*100,color:domColor('D5')}
    ];
    pieMount.append(makePie(slices));
    pieMount.append(makeLegend());
    // sensitivity
    sensMount.innerHTML='';
    const variants = [
      ['Die 面积 +10%','dieAreaMm2',1.1],['Die 面积 −10%','dieAreaMm2',0.9],
      ['D0 +20%','d0',1.2],['D0 −20%','d0',0.8],
      ['销量 +30%','annualVolume',1.3],['销量 −30%','annualVolume',0.7]
    ];
    variants.forEach(([label,k,m])=>{
      const pp = {...p,[k]:p[k]*m};
      const rr = computeUnitCost(pp);
      const diff = (rr.unit-unit)/unit*100;
      const row = el('div',{class:'out-row'});
      row.append(el('span',{},label));
      const b = el('b',{style:`color:${diff>0?'var(--d4)':'var(--ok)'}`},(diff>0?'+':'')+fmt(diff,2)+' %');
      row.append(b); sensMount.append(row);
    });
  }
  setTimeout(update,0);
  return wrap;
}

/* ========== 12d. CSV 工具 ========== */
function csvEscape(v){
  if(v==null) return '';
  if(Array.isArray(v)) v = v.join('|');
  const s = String(v);
  if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function toCSV(rows, columns){
  const head = columns.join(',');
  const body = rows.map(r=>columns.map(c=>csvEscape(r[c])).join(',')).join('\n');
  return head+'\n'+body;
}
function parseCSV(text){
  const rows = []; let cur = []; let f = ''; let q = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(q){
      if(c==='"' && text[i+1]==='"'){ f+='"'; i++; }
      else if(c==='"'){ q=false; }
      else f+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ cur.push(f); f=''; }
      else if(c==='\n' || c==='\r'){
        if(c==='\r' && text[i+1]==='\n') i++;
        cur.push(f); rows.push(cur); cur=[]; f='';
      } else f+=c;
    }
  }
  if(f.length||cur.length){cur.push(f); rows.push(cur);}
  if(!rows.length) return [];
  const head = rows.shift();
  return rows.filter(r=>r.length>=head.length-1 && r.some(x=>x!=='')).map(r=>{
    const o = {};
    head.forEach((h,i)=>{o[h]=r[i]==null?'':r[i];});
    return o;
  });
}
function downloadCSV(filename, csv){
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function importCSVFile(type, file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const text = reader.result;
      const rows = parseCSV(text);
      applyCSVRows(type, rows);
      saveAll(); buildChipPicker(); render();
      toast('已导入 '+rows.length+' 条记录');
    }catch(e){alert('导入失败：'+e.message);}
  };
  reader.readAsText(file,'utf-8');
}
// 字段归一：数字转数、|分隔转数组
function normalizeRow(type, raw){
  const sc = SCHEMA[type==='chip'?'chip':type]; if(!sc) return raw;
  const o = {};
  sc.fields.forEach(f=>{
    let v = raw[f.k];
    if(v===undefined||v==='') return;
    if(f.type==='number') v = parseFloat(v);
    else if(f.type==='csv') v = String(v).split(/[|,]/).map(s=>s.trim()).filter(Boolean);
    o[f.k] = v;
  });
  // 其他未声明的列（如 capabilities/products）也保留
  Object.keys(raw).forEach(k=>{
    if(o[k]!==undefined) return;
    let v = raw[k];
    if(v==='') return;
    if(/^-?\d+(?:\.\d+)?$/.test(v)) v = parseFloat(v);
    else if(typeof v==='string' && v.includes('|')) v = v.split('|').map(s=>s.trim()).filter(Boolean);
    o[k] = v;
  });
  return o;
}
function applyCSVRows(type, rows){
  if(type==='chip'){
    rows.forEach(r=>{
      const obj = normalizeRow('chip', r);
      if(!obj.name) return;
      TARGET_CHIPS[obj.name] = obj;
    });
  } else {
    const arr = getCollection(type), sc = SCHEMA[type];
    rows.forEach(r=>{
      const obj = normalizeRow(type, r);
      const id = obj[sc.idKey]; if(!id) return;
      const idx = arr.findIndex(x=>x[sc.idKey]===id);
      if(idx>=0) arr[idx] = obj; else arr.push(obj);
    });
  }
}
function exportCSV(type){
  if(type==='chip'){
    const cols = ['name','vendor','node','pkg','dieAreaMm2','waferPriceUsd','d0','maskSetUsd','pkgUsd','testUsd','royaltyUsd','overheadPct','annualVolume','blurb'];
    downloadCSV('chips.csv', toCSV(Object.values(TARGET_CHIPS), cols));
  } else if(type==='supplier'){
    const cols = ['id','name','layer','region','hq','founded','website','role','capabilities','products','notes'];
    downloadCSV('suppliers.csv', toCSV(SUPPLIERS, cols));
  } else if(type==='wafer'){
    const cols = ['node','TSMC','Samsung','SMIC','UMC','GF','Intel','HHGrace','NexChip'];
    downloadCSV('wafer-prices.csv', toCSV(WAFER_PRICES, cols));
  } else if(type==='item'){
    const cols = ['id','name','domainId','phase','type','drivers','range','description','supplierIds'];
    downloadCSV('cost-items.csv', toCSV(COST_ITEMS, cols));
  } else if(type==='pkg'){
    const cols = ['id','name','fullName','pinRange','costRange','useCase','suppliers'];
    downloadCSV('packages.csv', toCSV(PACKAGE_FORMATS, cols));
  }
  toast('已导出 '+type+'.csv，可用 Excel 编辑后导入');
}
function triggerImport(type){
  let inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.csv,text/csv';
  inp.addEventListener('change',e=>{const f=e.target.files[0]; if(f) importCSVFile(type,f);});
  inp.click();
}

    else if(action==='3') deleteRecord('chip',cur);
    else if(action==='4') resetAll();
  });
  render();
}
init();
</script>
